<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <link rel="stylesheet" href="styles.css" />
    <title>habitTrackers</title>
  </head>

  <body>
    <div
      class="wrapper shiftWrapper py-10 px-6 min-h-screen h-full text-slate-800 bg-slate-100"
    >
      <div
        class="loader fixed inset-0 bg-white/70 flex items-center justify-center z-50 hidden"
      >
        <div
          class="animate-spin rounded-full h-10 w-10 border-4 border-slate-300 border-t-indigo-600"
        ></div>
      </div>
      <div class="topMenu flex items-center justify-between">
        <h1 class="stylishFont text-4xl text-indigo-600">H</h1>
        <span class="openNewHabitForm font-bold rounded-lg bg-slate-300 p-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
            class="size-4"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 4.5v15m7.5-7.5h-15"
            />
          </svg>
        </span>
      </div>

      <!-- Create new habit  -->
      <div
        class="newHabitBox hidden z-20 shadow-2xl fixed top-0 left-0 bg-white p-6 w-full"
      >
        <h1 class="font-bold uppercase text-center text-xl">New Habit</h1>

        <div class="newHabitForm mt-5 flex flex-col gap-y-4">
          <div class="font-bold flex flex-col gap-y-2 uppercase text-xs">
            <span>Name</span>
            <input
              type="text"
              name=""
              id=""
              class="newHabitName uppercase w-full rounded-lg bg-slate-200 p-3 mt-2 placeholder:uppercase"
              placeholder="Habit details"
            />
          </div>

          <div class="font-bold flex flex-col gap-y-2 uppercase text-xs">
            <span>Type</span>
            <select
              name=""
              id=""
              class="newHabitType w-full rounded-lg bg-slate-200 p-3 uppercase"
            >
              <option value="select">select</option>
              <option value="count">count</option>
              <option value="text">text</option>
            </select>
          </div>

          <div class="w-full flex items-center justify-center gap-x-4">
            <span
              class="createNewHabitButton bg-slate-800 text-white uppercase text-center rounded-lg p-2 text-sm w-full font-bold tracking-widest"
              >Create</span
            >
            <span
              class="cancelNewHabitButton bg-slate-200 text-slate-800 uppercase text-center rounded-lg p-2 text-sm w-full font-bold tracking-widest"
              >Cancel</span
            >
          </div>
        </div>
      </div>

      <!-- Date selector  -->
      <div class="today my-5 font-bold flex items-center justify-between">
        <input
          type="date"
          name=""
          id=""
          class="datePicker rounded-lg font-bold bg-slate-200 border-transparent p-2 w-full"
        />
      </div>

      <!-- Habit list  -->
      <div class="habitListWrapper flex w-full flex-col gap-y-5 py-5"></div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
